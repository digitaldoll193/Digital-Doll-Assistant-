<!-- Digital Doll Assistant Chatbox for Wix -->
<!-- Wix: Add Elements > Embed Code > Embed HTML, then paste everything below -->

<div id="dda-widget"></div>

<style>
#dda-widget{position:fixed;right:22px;bottom:22px;z-index:999999;font-family:Arial,Helvetica,sans-serif}
.dda-bubble{width:76px;height:76px;border-radius:50%;background:radial-gradient(circle at 35% 25%,#70dcff,#0877ff 45%,#111827 78%);box-shadow:0 0 25px #178bff,0 0 60px rgba(124,49,255,.55);border:2px solid rgba(255,255,255,.35);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:22px}
.dda-panel{width:390px;max-width:calc(100vw - 28px);height:620px;max-height:calc(100vh - 120px);border-radius:26px;overflow:hidden;background:#070b14;border:1px solid rgba(80,166,255,.55);box-shadow:0 0 35px rgba(0,115,255,.35),0 20px 70px rgba(0,0,0,.7);display:none;flex-direction:column}
.dda-header{background:linear-gradient(135deg,#05070d,#0e1b35 55%,#23104a);padding:18px;border-bottom:1px solid rgba(80,166,255,.35);color:#fff;position:relative}
.dda-brand{font-size:22px;font-weight:800}.dda-sub{color:#b7cdfb;font-size:12px;margin-top:4px;text-transform:uppercase;letter-spacing:1.8px}.dda-status{margin-top:10px;color:#28ff7e;font-size:13px}.dda-close{position:absolute;top:17px;right:17px;background:transparent;color:white;border:none;font-size:25px;cursor:pointer}
.dda-body{padding:16px;flex:1;overflow-y:auto;background:radial-gradient(circle at top right,rgba(0,118,255,.16),transparent 38%),radial-gradient(circle at bottom left,rgba(142,45,255,.16),transparent 35%),#070b14}
.dda-msg{padding:12px 14px;border-radius:18px;margin:10px 0;line-height:1.45;font-size:14px}.dda-ai{background:rgba(255,255,255,.08);border:1px solid rgba(91,168,255,.25);color:#fff;border-top-left-radius:5px}.dda-user{background:linear-gradient(135deg,#0877ff,#7438ff);color:#fff;margin-left:45px;border-top-right-radius:5px}
.dda-actions{display:grid;gap:9px;margin-top:12px}.dda-action{width:100%;padding:13px 14px;border-radius:14px;border:1px solid rgba(38,145,255,.65);background:rgba(11,25,48,.86);color:#fff;cursor:pointer;text-align:left;font-size:14px}.dda-action:hover{background:rgba(25,96,184,.9)}
.dda-form{display:grid;gap:9px;margin-top:12px}.dda-input,.dda-select,.dda-textarea{width:100%;box-sizing:border-box;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(100,174,255,.35);border-radius:12px;padding:12px;outline:none}.dda-input::placeholder,.dda-textarea::placeholder{color:#9bb2d6}.dda-select option{color:#000}.dda-submit{background:linear-gradient(135deg,#0877ff,#7b37ff);color:white;border:none;border-radius:14px;padding:13px;font-weight:800;cursor:pointer}
.dda-footer{border-top:1px solid rgba(80,166,255,.25);padding:12px;background:#05070d}.dda-row{display:flex;gap:8px}.dda-type{flex:1;background:rgba(255,255,255,.08);color:white;border:1px solid rgba(100,174,255,.35);border-radius:14px;padding:12px;outline:none}.dda-send{width:52px;border:none;border-radius:14px;background:#0877ff;color:white;font-size:18px;cursor:pointer}.dda-powered{color:#8299c5;text-align:center;font-size:11px;padding-top:8px}
@media(max-width:520px){#dda-widget{right:12px;bottom:12px}.dda-panel{width:calc(100vw - 24px);height:calc(100vh - 90px)}}
</style>

<script>
(function(){
const BUSINESS={email:"Mypersonaltouch2u@gmail.com",phone:"561-767-7285",setupFee:"$1,500 setup fee",monthly:"$297/month"};
const root=document.getElementById("dda-widget");
root.innerHTML='<div class="dda-panel" id="ddaPanel"><div class="dda-header"><button class="dda-close" id="ddaClose">×</button><div class="dda-brand">Digital Doll Assistant</div><div class="dda-sub">The AI Employee That Works While You Sleep</div><div class="dda-status">● Online • 24/7 AI Business Assistant</div></div><div class="dda-body" id="ddaBody"></div><div class="dda-footer"><div class="dda-row"><input class="dda-type" id="ddaInput" placeholder="Type your message..." /><button class="dda-send" id="ddaSend">➤</button></div><div class="dda-powered">Powered by Digital Doll Assistant</div></div></div><div class="dda-bubble" id="ddaBubble">DDA</div>';
const panel=document.getElementById("ddaPanel"),bubble=document.getElementById("ddaBubble"),close=document.getElementById("ddaClose"),body=document.getElementById("ddaBody"),input=document.getElementById("ddaInput"),send=document.getElementById("ddaSend");
function scrollBottom(){body.scrollTop=body.scrollHeight}
function ai(text){const m=document.createElement("div");m.className="dda-msg dda-ai";m.innerHTML=text;body.appendChild(m);scrollBottom()}
function user(text){const m=document.createElement("div");m.className="dda-msg dda-user";m.textContent=text;body.appendChild(m);scrollBottom()}
function actions(buttons){const w=document.createElement("div");w.className="dda-actions";buttons.forEach(b=>{const btn=document.createElement("button");btn.className="dda-action";btn.textContent=b.label;btn.onclick=b.onClick;w.appendChild(btn)});body.appendChild(w);scrollBottom()}
function mainMenu(){ai('👋 Welcome to <strong>Digital Doll Assistant</strong>.<br><br>I’m your 24/7 AI business assistant. <strong>I work while you sleep.</strong><br><br>I help businesses answer questions, capture leads, book appointments, follow up with customers, and generate more revenue.<br><br>How can I help you today?');actions([{label:"💎 Set Up Fee",onClick:setupFee},{label:"📅 Book Free Consultation",onClick:consultation},{label:"💰 View Pricing",onClick:pricing},{label:"🤖 What Does The AI Do?",onClick:features},{label:"🏡 Real Estate AI Assistant",onClick:realEstate},{label:"👤 Talk To A Human",onClick:human}])}
function setupFee(){user("Set Up Fee");ai('Our professional setup fee is <strong>'+BUSINESS.setupFee+'</strong>.<br><br>This includes custom AI setup, business knowledge training, website installation, lead capture setup, appointment flow, CRM setup, testing, and launch support.<br><br>After setup, your monthly service is <strong>'+BUSINESS.monthly+'</strong>.');actions([{label:"📅 Start My Setup Consultation",onClick:consultation},{label:"⬅ Main Menu",onClick:mainMenu}])}
function pricing(){user("View Pricing");ai('Digital Doll Assistant pricing is simple:<br><br>✅ <strong>$1,500 setup fee</strong><br>✅ <strong>$297/month</strong><br><br>You get a 24/7 AI assistant that captures leads, answers questions, books appointments, supports follow-ups, and helps your business grow.');actions([{label:"📅 Book Free Consultation",onClick:consultation},{label:"💎 Set Up Fee Details",onClick:setupFee},{label:"⬅ Main Menu",onClick:mainMenu}])}
function features(){user("What Does The AI Do?");ai('<strong>Digital Doll Assistant includes:</strong><br><br>🤖 Core AI features<br>📅 Appointment booking, rescheduling, and cancellations<br>🗓 Calendar integration<br>💬 Customer support<br>📈 Lead generation and qualification<br>💰 Sales support<br>⚙️ Automation<br>📧 Email support<br>📱 SMS follow-up<br>👥 CRM features<br>📋 Forms<br>🔔 Notifications<br>📊 Analytics<br>🏭 Industry customization<br>🔗 Integrations<br>🔒 Security');actions([{label:"📅 Book Free Consultation",onClick:consultation},{label:"💰 View Pricing",onClick:pricing},{label:"⬅ Main Menu",onClick:mainMenu}])}
function realEstate(){user("Real Estate AI Assistant");ai('For real estate professionals, Digital Doll Assistant can capture buyer and seller leads, qualify prospects, answer property questions, book consultations, schedule showings, and follow up automatically.<br><br>It helps agents respond faster and stop losing leads while they are busy showing homes or closing deals.');actions([{label:"📅 Book Real Estate Demo",onClick:consultation},{label:"⬅ Main Menu",onClick:mainMenu}])}
function consultation(){user("Book Free Consultation");ai("Perfect. Fill this out and we’ll follow up to discuss your AI assistant setup.");showForm("Free Consultation")}
function human(){user("Talk To A Human");ai("No problem. Leave your details and we’ll contact you directly.");showForm("Human Request")}
function showForm(type){const f=document.createElement("form");f.className="dda-form";f.innerHTML='<input class="dda-input" name="name" placeholder="Full Name" required /><input class="dda-input" name="phone" placeholder="Phone Number" required /><input class="dda-input" name="email" placeholder="Email Address" required /><input class="dda-input" name="business" placeholder="Business Name" /><select class="dda-select" name="industry"><option value="">Select Industry</option><option>Real Estate</option><option>Medical</option><option>Legal</option><option>Beauty / Salon</option><option>Contractor / Home Services</option><option>Restaurant</option><option>Retail</option><option>Other</option></select><textarea class="dda-textarea" name="message" rows="3" placeholder="What do you want your AI assistant to help with?"></textarea><button class="dda-submit" type="submit">Send My Request</button>';f.onsubmit=function(e){e.preventDefault();const d=Object.fromEntries(new FormData(f).entries());const subject=encodeURIComponent("Digital Doll Assistant Lead - "+type);const bodyText=encodeURIComponent("Lead Type: "+type+"\nName: "+d.name+"\nPhone: "+d.phone+"\nEmail: "+d.email+"\nBusiness: "+d.business+"\nIndustry: "+d.industry+"\nMessage: "+d.message);ai('✅ Thank you, <strong>'+d.name+'</strong>!<br><br>Your request has been captured.<br><br><a style="color:#70dcff;font-weight:bold" href="mailto:'+BUSINESS.email+'?subject='+subject+'&body='+bodyText+'">Click here to send this lead to '+BUSINESS.email+'</a><br><br>Or call us at <strong>'+BUSINESS.phone+'</strong>.');f.remove();actions([{label:"⬅ Main Menu",onClick:mainMenu}])};body.appendChild(f);scrollBottom()}
function smartReply(text){const t=text.toLowerCase();if(t.includes("setup")||t.includes("set up")||t.includes("fee"))return setupFee();if(t.includes("price")||t.includes("cost")||t.includes("monthly"))return pricing();if(t.includes("book")||t.includes("appointment")||t.includes("consultation")||t.includes("demo"))return consultation();if(t.includes("real estate")||t.includes("realtor")||t.includes("agent"))return realEstate();if(t.includes("feature")||t.includes("do")||t.includes("work"))return features();ai("I can help with pricing, the setup fee, booking a free consultation, features, real estate AI solutions, appointment booking, lead capture, CRM, email, SMS, and automation.");actions([{label:"💎 Set Up Fee",onClick:setupFee},{label:"📅 Book Free Consultation",onClick:consultation},{label:"💰 View Pricing",onClick:pricing}])}
function sendMessage(){const text=input.value.trim();if(!text)return;user(text);input.value="";setTimeout(()=>smartReply(text),400)}
bubble.onclick=()=>{bubble.style.display="none";panel.style.display="flex";if(!body.dataset.started){body.dataset.started="true";mainMenu()}};
close.onclick=()=>{panel.style.display="none";bubble.style.display="flex"};
send.onclick=sendMessage;input.addEventListener("keydown",e=>{if(e.key==="Enter")sendMessage()});
})();
</script>
